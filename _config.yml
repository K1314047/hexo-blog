# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# 站点信息
title: G.Ark Blog
subtitle: '记录分享生活中的美好和经验'
description: '个人技术笔记与生活记录'
keywords: 技术, 笔记, 生活, 分享
author: G.Ark
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: http://example.com
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# 目录
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 写作
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js

# 代码高亮配置
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# 首页设置
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 分类 & 标签
archive_generator:
  per_page: 0
  yearly: true
  monthly: true
  daily: false

category_generator:
  per_page: 0

tag_generator:
  per_page: 0

# 分页
per_page: 10
pagination_dir: page

# 扩展插件
plugins:

# 部署
deploy:
  type: git
  repo: 
  branch: main

# 主题设置
theme: ws01-note

theme_config:
  latest_count: 5
  search_path: search.json
  search_placeholder: 搜索一下
  search_button_text: 搜索
  latest_title: 最新发布
  empty_text: 暂无内容

# 搜索插件配置
search:
  path: search.xml
  field: post
  content: html
  format: 10000